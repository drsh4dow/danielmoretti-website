<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="740" viewBox="0 0 1200 740" role="img" aria-labelledby="title description">
	<title id="title">Abstract voice analysis waveform</title>
	<desc id="description">Sky and teal audio waveforms flow through an analysis pipeline on a dark slate background.</desc>
