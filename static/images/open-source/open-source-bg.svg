<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="740" viewBox="0 0 1200 740" role="img" aria-labelledby="title description">
	<title id="title">Abstract open source terminal</title>
	<desc id="description">A dark terminal interface with teal code, connected modules, and subtle tooling symbols.</desc>
	<defs>
		<linearGradient id="background" x1="90" y1="70" x2="1110" y2="680" gradientUnits="userSpaceOnUse">
			<stop stop-color="#0f172a" />
			<stop offset="0.55" stop-color="#102a33" />
			<stop offset="1" stop-color="#042f2e" />
		</linearGradient>
		<linearGradient id="terminal" x1="250" y1="130" x2="950" y2="610" gradientUnits="userSpaceOnUse">
			<stop stop-color="#1e293b" stop-opacity="0.96" />
			<stop offset="1" stop-color="#0f172a" stop-opacity="0.88" />
		</linearGradient>
		<linearGradient id="accent" x1="310" y1="0" x2="890" y2="0" gradientUnits="userSpaceOnUse">
			<stop stop-color="#2dd4bf" />
			<stop offset="1" stop-color="#38bdf8" />
		</linearGradient>
		<radialGradient id="glow" cx="0" cy="0" r="1" gradientTransform="translate(620 360) rotate(90) scale(320 500)" gradientUnits="userSpaceOnUse">
			<stop stop-color="#14b8a6" stop-opacity="0.2" />
			<stop offset="1" stop-color="#14b8a6" stop-opacity="0" />
		</radialGradient>
		<pattern id="dots" width="36" height="36" patternUnits="userSpaceOnUse">
			<circle cx="2" cy="2" r="1.5" fill="#94a3b8" fill-opacity="0.12" />
		</pattern>
		<filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
			<feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#020617" flood-opacity="0.5" />
		</filter>
	</defs>
	<rect width="1200" height="740" rx="36" fill="url(#background)" />
	<rect width="1200" height="740" rx="36" fill="url(#dots)" />
	<rect width="1200" height="740" rx="36" fill="url(#glow)" />
	<g fill="none" stroke="#2dd4bf" stroke-opacity="0.18" stroke-width="2">
		<path d="M84 176H204C226 176 244 194 244 216V252" />
		<path d="M1116 564H996C974 564 956 546 956 524V488" />
		<path d="M148 606H204C226 606 244 588 244 566V534" />
		<path d="M1052 134H996C974 134 956 152 956 174V206" />
	</g>
	<g fill="#0f172a" stroke="#2dd4bf" stroke-opacity="0.42">
		<rect x="68" y="146" width="32" height="32" rx="9" />
		<rect x="1100" y="548" width="32" height="32" rx="9" />
		<rect x="132" y="590" width="32" height="32" rx="9" />
		<rect x="1036" y="118" width="32" height="32" rx="9" />
	</g>
	<g filter="url(#shadow)">
		<rect x="228" y="104" width="744" height="532" rx="28" fill="url(#terminal)" stroke="#475569" stroke-opacity="0.55" />
		<path d="M228 176H972" stroke="#475569" stroke-opacity="0.5" />
	</g>
	<circle cx="276" cy="140" r="8" fill="#fb7185" fill-opacity="0.85" />
	<circle cx="306" cy="140" r="8" fill="#fbbf24" fill-opacity="0.85" />
	<circle cx="336" cy="140" r="8" fill="#2dd4bf" fill-opacity="0.85" />
	<rect x="714" y="126" width="206" height="28" rx="14" fill="#0f172a" stroke="#475569" stroke-opacity="0.52" />
	<circle cx="738" cy="140" r="5" fill="#2dd4bf" />
	<rect x="754" y="135" width="104" height="10" rx="5" fill="#64748b" fill-opacity="0.44" />
	<g font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="26" font-weight="600">
		<text x="286" y="234" fill="#2dd4bf">$</text>
		<text x="320" y="234" fill="#cbd5e1">cargo build</text>
		<text x="286" y="288" fill="#64748b">Compiling</text>
		<text x="438" y="288" fill="#38bdf8">toolkit</text>
		<text x="286" y="342" fill="#64748b">Finished</text>
		<text x="412" y="342" fill="#99f6e4">release</text>
		<text x="286" y="414" fill="#2dd4bf">$</text>
		<text x="320" y="414" fill="#cbd5e1">bun test</text>
		<text x="286" y="468" fill="#64748b">6 projects</text>
		<text x="446" y="468" fill="#5eead4">ready</text>
	</g>
	<g fill="none" stroke="url(#accent)" stroke-width="5" stroke-linecap="round" stroke-linejoin="round">
		<path d="M692 270L642 320L692 370" />
		<path d="M780 270L830 320L780 370" />
		<path d="M758 244L716 396" />
	</g>
	<g>
		<rect x="286" y="526" width="112" height="38" rx="19" fill="#134e4a" stroke="#2dd4bf" stroke-opacity="0.48" />
		<circle cx="312" cy="545" r="7" fill="#2dd4bf" />
		<rect x="329" y="540" width="44" height="10" rx="5" fill="#99f6e4" fill-opacity="0.72" />
		<rect x="414" y="526" width="112" height="38" rx="19" fill="#0c4a6e" stroke="#38bdf8" stroke-opacity="0.48" />
		<circle cx="440" cy="545" r="7" fill="#38bdf8" />
		<rect x="457" y="540" width="44" height="10" rx="5" fill="#bae6fd" fill-opacity="0.72" />
		<rect x="542" y="526" width="112" height="38" rx="19" fill="#1e293b" stroke="#94a3b8" stroke-opacity="0.38" />
		<circle cx="568" cy="545" r="7" fill="#94a3b8" />
		<rect x="585" y="540" width="44" height="10" rx="5" fill="#cbd5e1" fill-opacity="0.62" />
	</g>
	<path d="M680 545H840" stroke="#475569" stroke-width="3" stroke-linecap="round" />
	<circle cx="710" cy="545" r="9" fill="#2dd4bf" />
	<circle cx="760" cy="545" r="9" fill="#38bdf8" />
	<circle cx="810" cy="545" r="9" fill="#94a3b8" />
</svg>
